services:
  backend:
    build: ./backend
    ports:
      - '8001:8000'
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - SECRET_KEY=supersecretchangeme
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - CORS_ORIGINS=https://liteia.rafaeldevs.lat,http://10.0.0.84:5173,http://home-nas.local:5173
      # N100/8GB performance profile (history on, low TTFT focus)
      - MODEL_CONTEXT_LIMIT=4096
      - RESPONSE_TOKEN_RESERVE=512
      - ENABLE_DYNAMIC_HISTORY_BUDGET=true
      - HISTORY_MAX_PROMPT_TOKENS=2048
      - HISTORY_RECENT_MESSAGES_CAP=20
      - HISTORY_RECENT_TOKENS_CAP=1800
      - HISTORY_MESSAGE_CHAR_CAP=700
      - HISTORY_RESPONSE_TOKEN_CAP=512
      - HISTORY_INCLUDE_ASSISTANT_MESSAGES=true
      - ENABLE_CONVERSATION_SUMMARY=true
      - SUMMARY_IN_REQUEST_PATH=false
      - SUMMARY_TRIGGER_MESSAGES=20
      - SUMMARY_TRIGGER_TOKENS=2800
      - SUMMARY_KEEP_RECENT_MESSAGES=20
      - SUMMARY_RESPONSE_TOKENS=160
    volumes:
      - ./backend:/app
      - ./backend/export:/app/export

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=
    depends_on:
      - backend
