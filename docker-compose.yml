services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - SECRET_KEY=supersecretchangeme
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
