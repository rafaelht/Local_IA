upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de uploads
    client_max_body_size 50M;

    # Proxy al backend para /api
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        # Necesario para SSE (streaming de respuestas del LLM)
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para generación de respuestas
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # Proxy al frontend para todo lo demás
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;

        # WebSocket para hot-reload de Vite en desarrollo
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
